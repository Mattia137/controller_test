<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HYPEROBJECT // REMOTE</title>
    <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: 'Fragment Mono', monospace; overflow: hidden;
            user-select: none; -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }
        #energy-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; }
        
        .ui-layer { position: absolute; width: 100%; height: 100%; z-index: 20; pointer-events: none; }
        .interactive { pointer-events: all; }

        /* RESET BUTTON */
        #reset-container { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); }
        .reset-btn {
            font-size: 10px; letter-spacing: 4px; border: 1px solid rgba(255, 255, 255, 0.3);
            background: none; color: #fff; font-family: 'Fragment Mono', monospace;
            padding: 8px 20px; cursor: pointer; transition: all 0.2s;
        }
        .reset-btn:active { background: #fff; color: #000; }

        /* ACTION SQUARE */
        #action-container {
            position: absolute; bottom: 45%; left: 25%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .action-square {
            width: 40px; height: 40px; border: 1px solid #fff;
            background: transparent; transition: background 0.1s;
            cursor: pointer;
        }
        .action-square:active { background: #fff; }
        .label-small { font-size: 7px; opacity: 0.3; letter-spacing: 2px; text-transform: uppercase; }

        /* SLIDER */
        #slider-container {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 60%; display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 1px; background: rgba(255,255,255,0.2); }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 12px; width: 12px; background: #fff;
            margin-top: -6px; border-radius: 0;
        }

        /* JOYSTICKS */
        .zones { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; grid-template-columns: 1fr 1fr; z-index: 10; }
        .nipple .back { background: transparent !important; border: 0.5px solid rgba(255,255,255,0.1) !important; }
        .nipple .front { 
            background: transparent !important; 
            border: 1px solid rgba(255,255,255,0.8) !important;
            transition: background 0.1s, box-shadow 0.1s;
        }
        .nipple.active .front { 
            background: #fff !important; 
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.6); 
        }

        #status-indicator {
            position: absolute; top: 10px; left: 10px; font-size: 6px; letter-spacing: 1px;
            opacity: 0.5; color: #ff0000;
        }
        #status-indicator.connected { color: #00ff00; }
    </style>
</head>
<body>
    <div id="status-indicator">DISCONNECTED</div>
    <canvas id="energy-canvas"></canvas>
    
    <div class="ui-layer">
        <div id="reset-container" class="interactive">
            <button class="reset-btn" onclick="sendCmd('RESET')">RESET</button>
        </div>

        <div id="action-container" class="interactive">
            <div class="action-square" onclick="sendCmd('ACTION')"></div>
            <div class="label-small">EXECUTE</div>
        </div>

        <div id="slider-container" class="interactive">
            <div class="label-small" style="opacity: 0.2">SEQUENCE_MAP</div>
            <input type="range" min="0" max="100" value="0" oninput="sendSlider(this.value)">
        </div>
    </div>

    <div class="zones">
        <div id="left-zone"></div>
        <div id="right-zone"></div>
    </div>

    <script>
        const canvas = document.getElementById('energy-canvas');
        const ctx = canvas.getContext('2d');
        const statusInd = document.getElementById('status-indicator');
        let particles = [];
        let activeTouches = {};
        let time = 0;

        // ENERGY VISUALS
        class EnergyParticle {
            constructor(tx, ty) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 40 + Math.random() * 40; 
                this.x = tx + Math.cos(angle) * radius;
                this.y = ty + Math.sin(angle) * radius;
                this.tx = tx; this.ty = ty;
                this.size = Math.random() * 0.3 + 0.1;
                this.speed = 0.02 + Math.random() * 0.03; 
                this.life = 1.0;
                this.noiseOffset = Math.random() * 1000;
            }
            update() {
                this.x += (this.tx - this.x) * this.speed + Math.sin(time * 3 + this.noiseOffset) * 0.5;
                this.y += (this.ty - this.y) * this.speed + Math.cos(time * 3 + this.noiseOffset) * 0.5;
                this.life -= 0.02;
            }
            draw() {
                const opacity = this.life * 0.3;
                const bloomSize = this.size * 40;
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, bloomSize, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animate() {
            time += 0.01;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'lighter';
            
            Object.keys(activeTouches).forEach(key => {
                const t = activeTouches[key];
                if (t) {
                    for(let i = 0; i < 3; i++) particles.push(new EnergyParticle(t.x, t.y));
                }
            });

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
            requestAnimationFrame(animate);
        }

        // PEER CONNECTION
        const urlParams = new URLSearchParams(window.location.search);
        const desktopId = urlParams.get('id');
        const peer = new Peer();
        let conn;

        peer.on('open', (id) => {
            if (desktopId) {
                conn = peer.connect(desktopId);
                setupConnListeners();
            }
        });

        function setupConnListeners() {
            conn.on('open', () => {
                statusInd.innerText = 'LINK_STABLE';
                statusInd.classList.add('connected');
                if (navigator.vibrate) navigator.vibrate([30, 30, 30]);
            });
            conn.on('close', () => {
                statusInd.innerText = 'LINK_LOST';
                statusInd.classList.remove('connected');
            });
        }

        function sendCmd(cmd) {
            if (conn && conn.open) conn.send({ type: 'BUTTON', action: cmd });
            if (navigator.vibrate) navigator.vibrate(25);
        }

        function sendSlider(val) {
            if (conn && conn.open) conn.send({ type: 'SLIDE', value: parseFloat(val) / 100 });
        }

        // JOYSTICKS
        const options = { mode: 'static', size: 100, threshold: 0.1 };
        const leftJoy = nipplejs.create({ zone: document.getElementById('left-zone'), ...options, position: { bottom: '25%', left: '25%'} });
        const rightJoy = nipplejs.create({ zone: document.getElementById('right-zone'), ...options, position: { bottom: '25%', right: '25%'} });

        function setupJoy(joy, type) {
            joy.on('start', () => {
                const el = joy.get().el;
                if(el) el.classList.add('active');
            });

            joy.on('move', (evt, data) => {
                // Track visual position for particles
                const pos = data.instance.ui.front.getBoundingClientRect();
                activeTouches[type] = { x: pos.left + pos.width/2, y: pos.top + pos.height/2 };
                
                if (conn && conn.open) {
                    // Normalize NippleJS Y (negative is up) to 3D Y (positive is forward)
                    conn.send({ 
                        type: type, 
                        x: data.vector.x, 
                        y: -data.vector.y, 
                        force: data.force 
                    });
                }
            });

            joy.on('end', () => {
                const el = joy.get().el;
                if(el) el.classList.remove('active');
                delete activeTouches[type];
                if (conn && conn.open) conn.send({ type: type, x: 0, y: 0, force: 0 });
            });
        }

        setupJoy(leftJoy, 'MOVE'); 
        setupJoy(rightJoy, 'ROTATE');

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        animate();
    </script>
</body>
</html>
