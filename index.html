<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REMOTE // DEBUG</title>
    <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Fragment Mono', monospace; font-size: 11px; padding: 20px; overflow-y: auto; }
        h1 { font-size: 10px; letter-spacing: 4px; opacity: 0.4; margin-bottom: 20px; }
        #log { display: flex; flex-direction: column; gap: 6px; }
        .entry { display: flex; gap: 10px; align-items: flex-start; line-height: 1.5; }
        .dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
        .ok   .dot { background: #00ff88; }
        .warn .dot { background: #ffaa00; }
        .err  .dot { background: #ff3a3a; }
        .info .dot { background: #4488ff; }
        .msg { opacity: 0.85; word-break: break-all; }
        #test-btn { margin-top: 30px; width: 100%; padding: 14px; background: none; border: 1px solid rgba(255,255,255,0.3); color: #fff; font-family: 'Fragment Mono', monospace; font-size: 10px; letter-spacing: 3px; cursor: pointer; }
        #test-btn:active { background: #fff; color: #000; }
        #id-display { margin-top: 16px; font-size: 9px; opacity: 0.4; letter-spacing: 2px; word-break: break-all; }
    </style>
</head>
<body>
    <h1>HYPEROBJECT // DIAGNOSTIC</h1>
    <div id="log"></div>
    <button id="test-btn" style="display:none" onclick="sendTest()">SEND TEST PACKET</button>
    <div id="id-display"></div>

<script>
    const logEl = document.getElementById('log');

    function log(msg, type = 'info') {
        const entry = document.createElement('div');
        entry.className = `entry ${type}`;
        entry.innerHTML = `<div class="dot"></div><div class="msg">${msg}</div>`;
        logEl.appendChild(entry);
        window.scrollTo(0, document.body.scrollHeight);
    }

    // ── 1. Check URL param ────────────────────────────────────────────────
    const urlParams = new URLSearchParams(window.location.search);
    const desktopId = urlParams.get('id');
    if (!desktopId) {
        log('NO ?id= PARAM IN URL — open this page via the QR code from the desktop', 'err');
    } else {
        log(`TARGET ID: ${desktopId}`, 'info');
    }

    // ── 2. Check localStorage (Safari Private) ────────────────────────────
    try {
        localStorage.setItem('__test__', '1');
        localStorage.removeItem('__test__');
        log('localStorage: OK', 'ok');
    } catch(e) {
        log(`localStorage BLOCKED (Safari Private mode?) — applying polyfill`, 'warn');
        const mem = {};
        Object.defineProperty(window, 'localStorage', {
            value: {
                getItem: k => mem[k] ?? null,
                setItem: (k, v) => { mem[k] = v; },
                removeItem: k => delete mem[k],
                clear: () => Object.keys(mem).forEach(k => delete mem[k])
            }
        });
    }

    // ── 3. Check WebRTC support ───────────────────────────────────────────
    if (window.RTCPeerConnection) {
        log('WebRTC: supported', 'ok');
    } else {
        log('WebRTC: NOT SUPPORTED in this browser — try Chrome or regular Safari', 'err');
    }

    // ── 4. Init PeerJS ────────────────────────────────────────────────────
    log('Initializing PeerJS v1.5.4...', 'info');

    let peer, conn;

    try {
        peer = new Peer({
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun.cloudflare.com:3478' }
                ]
            },
            debug: 0
        });
    } catch(e) {
        log(`PeerJS constructor threw: ${e.message}`, 'err');
    }

    peer.on('open', (id) => {
        log(`PeerJS OPEN — my peer ID: ${id}`, 'ok');
        document.getElementById('id-display').textContent = `MY_ID: ${id}`;

        if (!desktopId) return;

        log(`Connecting to desktop: ${desktopId}`, 'info');
        log('Using serialization: json', 'info');

        conn = peer.connect(desktopId, { serialization: 'json', reliable: true });

        log('Connection object created — waiting for data channel...', 'info');

        conn.on('open', () => {
            log('DATA CHANNEL OPEN — connection fully established ✓', 'ok');
            document.getElementById('test-btn').style.display = 'block';
        });

        conn.on('error', (err) => {
            log(`conn.on(error): type=${err.type} msg=${err.message}`, 'err');
        });

        conn.on('close', () => {
            log('Connection closed by remote end', 'warn');
        });

        conn.on('iceStateChanged', (state) => {
            log(`ICE state: ${state}`, state === 'connected' ? 'ok' : state === 'failed' ? 'err' : 'warn');
        });
    });

    peer.on('disconnected', () => {
        log('PeerJS: disconnected from signaling server', 'warn');
        log('Attempting reconnect...', 'info');
        peer.reconnect();
    });

    peer.on('error', (err) => {
        log(`peer.on(error): type="${err.type}"`, 'err');
        log(`message: ${err.message}`, 'err');

        // Translate common errors
        const help = {
            'peer-unavailable':  '→ Desktop peer ID not found. Is the desktop open and on REMOTE mode? Try refreshing desktop first.',
            'network':           '→ Cannot reach PeerJS signaling server. Check internet connection on phone.',
            'server-error':      '→ PeerJS cloud server returned an error. Try again in 30 seconds.',
            'browser-incompatible': '→ This browser does not support WebRTC. Use regular Safari or Chrome.',
            'unavailable-id':    '→ ID conflict. Refresh the desktop page to get a new ID.',
        };
        if (help[err.type]) log(help[err.type], 'warn');
    });

    function sendTest() {
        if (conn && conn.open) {
            conn.send({ type: 'MOVE', x: 0.5, y: 0.5, force: 1 });
            log('Test packet sent → MOVE {x:0.5, y:0.5, force:1}', 'ok');
            setTimeout(() => {
                conn.send({ type: 'MOVE', x: 0, y: 0, force: 0 });
                log('Stop packet sent → MOVE {force:0}', 'ok');
            }, 500);
        } else {
            log('Cannot send — connection not open', 'err');
        }
    }
</script>
</body>
</html>
