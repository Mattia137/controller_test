<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HYPEROBJECT // REMOTE</title>
    <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        :root {
            --dim:  rgba(255,255,255,0.12);
            --dim2: rgba(255,255,255,0.05);
            --acc:  rgba(255,255,255,0.45);
            --red:  #ff3a3a; --amber: #ffaa00; --green: #00ff88;
        }
        body {
            background: #000; color: #fff;
            font-family: 'Fragment Mono', monospace;
            overflow: hidden; user-select: none; touch-action: none;
            width: 100vw; height: 100dvh; position: fixed;
        }
        body::after {
            content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 200;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
        }
        .corner { position: fixed; width: 14px; height: 14px; pointer-events: none; z-index: 150; opacity: 0.25; }
        .corner.tl { top: 10px; left: 10px;   border-top: 1px solid #fff; border-left:  1px solid #fff; }
        .corner.tr { top: 10px; right: 10px;  border-top: 1px solid #fff; border-right: 1px solid #fff; }
        .corner.bl { bottom: 10px; left: 10px;  border-bottom: 1px solid #fff; border-left:  1px solid #fff; }
        .corner.br { bottom: 10px; right: 10px; border-bottom: 1px solid #fff; border-right: 1px solid #fff; }

        /* TOP BAR */
        #top-bar {
            position: fixed; top: 0; left: 0; right: 0; height: 56px;
            display: flex; align-items: stretch;
            border-bottom: 1px solid var(--dim); z-index: 100;
        }
        .cmd-btn {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 3px;
            background: var(--dim2); border: none;
            border-right: 1px solid var(--dim);
            color: #fff; font-family: 'Fragment Mono', monospace;
            cursor: pointer; position: relative; overflow: hidden;
            transition: background 0.1s;
        }
        .cmd-btn:last-child { border-right: none; }
        .cmd-btn.pressed { background: rgba(255,255,255,0.18); }
        .btn-icon  { font-size: 18px; line-height: 1; opacity: 0.65; }
        .btn-label { font-size: 7px; letter-spacing: 3px; opacity: 0.4; text-transform: uppercase; }

        /* STATUS */
        #status-bar {
            position: fixed; top: 62px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 7px; z-index: 100;
        }
        #status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--red); transition: background 0.4s; }
        #status-dot.linking { background: var(--amber); animation: blink 0.7s infinite; }
        #status-dot.linked  { background: var(--green); animation: none; }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.1;} }
        #status-text { font-size: 7px; letter-spacing: 3px; color: var(--acc); text-transform: uppercase; }

        /* MAIN LAYOUT */
        #main-area {
            position: fixed; top: 56px; bottom: 0; left: 0; right: 0;
            display: flex;
        }

        /* LEFT: JOYSTICK */
        #left-panel { flex: 1.1; position: relative; border-right: 1px solid var(--dim); }
        #joy-zone   { position: absolute; inset: 0; }
        #move-label {
            position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
            font-size: 7px; letter-spacing: 3px; color: var(--acc); opacity: 0.35;
            white-space: nowrap; pointer-events: none;
        }

        /* RIGHT: GYRO */
        #right-panel {
            flex: 0.9; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 16px; padding: 16px;
        }
        .gyro-section-label {
            font-size: 7px; letter-spacing: 3px; color: var(--acc); opacity: 0.35; text-transform: uppercase;
        }
        #gyro-ring {
            width: 100px; height: 100px; border-radius: 50%;
            border: 1px solid var(--dim); background: var(--dim2);
            position: relative; flex-shrink: 0; transition: border-color 0.2s;
        }
        #gyro-ring::before {
            content: ''; position: absolute;
            width: 1px; height: 100%; left: 50%; top: 0;
            transform: translateX(-50%); background: var(--dim);
        }
        #gyro-ring::after {
            content: ''; position: absolute;
            height: 1px; width: 100%; top: 50%; left: 0;
            transform: translateY(-50%); background: var(--dim);
        }
        #gyro-ring.active { border-color: rgba(255,255,255,0.3); box-shadow: 0 0 16px rgba(255,255,255,0.04); }
        #gyro-dot {
            position: absolute; width: 8px; height: 8px; border-radius: 50%;
            background: #fff; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 8px rgba(255,255,255,0.5);
            transition: top 0.05s linear, left 0.05s linear;
        }
        #gyro-status {
            font-size: 7px; letter-spacing: 2px; color: var(--acc);
            opacity: 0.35; text-transform: uppercase;
        }
        #gyro-status.active { opacity: 1; color: var(--green); }
        #gyro-cal {
            font-size: 7px; letter-spacing: 2px; background: none;
            border: 1px solid var(--dim); color: var(--acc);
            font-family: 'Fragment Mono', monospace;
            padding: 8px 12px; cursor: pointer; text-transform: uppercase;
            transition: all 0.15s;
        }
        #gyro-cal:active { background: #fff; color: #000; border-color: #fff; }

        /* nipplejs */
        .nipple .back { background: transparent !important; border: 1px solid var(--dim) !important; box-shadow: none !important; }
        .nipple .front { background: transparent !important; border: 1px solid rgba(255,255,255,0.7) !important; box-shadow: none !important; }
        .nipple.active .front { background: rgba(255,255,255,0.1) !important; box-shadow: 0 0 16px rgba(255,255,255,0.2) !important; }

        /* GYRO PERMISSION */
        #gyro-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.96);
            z-index: 300; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 24px; padding: 36px;
        }
        #gyro-overlay.hidden { display: none; }
        .ol-title { font-size: 10px; letter-spacing: 5px; opacity: 0.5; text-transform: uppercase; }
        .ol-desc  { font-size: 9px; letter-spacing: 1px; opacity: 0.3; text-align: center; line-height: 2.2; }
        #allow-btn {
            font-size: 9px; letter-spacing: 4px; background: none;
            border: 1px solid rgba(255,255,255,0.3); color: #fff;
            font-family: 'Fragment Mono', monospace;
            padding: 16px 32px; cursor: pointer; text-transform: uppercase;
        }
        #allow-btn:active { background: #fff; color: #000; }

        #energy-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>

<canvas id="energy-canvas"></canvas>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>

<div id="top-bar">
    <button class="cmd-btn" ontouchstart="tapBtn(this,'BACK')"   onclick="sendCmd('BACK')">
        <span class="btn-icon">←</span><span class="btn-label">BACK</span>
    </button>
    <button class="cmd-btn" ontouchstart="tapBtn(this,'RESET')"  onclick="sendCmd('RESET')">
        <span class="btn-icon">⊙</span><span class="btn-label">RESET</span>
    </button>
    <button class="cmd-btn" ontouchstart="tapBtn(this,'ACTION')" onclick="sendCmd('ACTION')">
        <span class="btn-icon">◈</span><span class="btn-label">ACTION</span>
    </button>
</div>

<div id="status-bar">
    <div id="status-dot"></div>
    <div id="status-text">SEARCHING</div>
</div>

<div id="main-area">
    <div id="left-panel">
        <div id="joy-zone"></div>
        <div id="move-label">MOVE</div>
    </div>
    <div id="right-panel">
        <div class="gyro-section-label">LOOK</div>
        <div id="gyro-ring"><div id="gyro-dot"></div></div>
        <div id="gyro-status">AWAITING</div>
        <button id="gyro-cal" onclick="calibrateGyro()">RECALIBRATE</button>
    </div>
</div>

<div id="gyro-overlay">
    <div class="ol-title">MOTION ACCESS</div>
    <div class="ol-desc">This controller uses your device<br>gyroscope to rotate the camera.<br>Tap to allow motion sensor access.</div>
    <button id="allow-btn" onclick="requestGyro()">ALLOW MOTION</button>
</div>

<script>
// ── PARTICLES ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('energy-canvas');
const ctx = canvas.getContext('2d');
let particles = [], pts = {}, t = 0;
class P {
    constructor(tx,ty){const a=Math.random()*Math.PI*2,r=40+Math.random()*60;this.x=tx+Math.cos(a)*r;this.y=ty+Math.sin(a)*r;this.tx=tx;this.ty=ty;this.sz=Math.random()*0.18+0.06;this.spd=0.01+Math.random()*0.013;this.life=1;this.n=Math.random()*1000;}
    update(){this.x+=(this.tx-this.x)*this.spd+Math.sin(t*3+this.n)*0.35;this.y+=(this.ty-this.y)*this.spd+Math.cos(t*3+this.n)*0.35;this.life-=0.02;}
    draw(){const op=this.life*0.28,bs=this.sz*38;const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,bs);g.addColorStop(0,`rgba(255,255,255,${op})`);g.addColorStop(0.2,`rgba(255,255,255,${op*0.04})`);g.addColorStop(1,'rgba(255,255,255,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(this.x,this.y,bs,0,Math.PI*2);ctx.fill();}
}
function loop(){t+=0.01;ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.globalCompositeOperation='lighter';Object.values(pts).forEach(p=>{if(p)for(let i=0;i<3;i++)particles.push(new P(p.x,p.y));});for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();if(particles[i].life<=0)particles.splice(i,1);}ctx.globalCompositeOperation='source-over';requestAnimationFrame(loop);}
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();loop();

// ── STATUS ────────────────────────────────────────────────────────────────
const statusDot=document.getElementById('status-dot');
const statusTxt=document.getElementById('status-text');
function setStatus(cls,lbl){statusDot.className=cls;statusTxt.textContent=lbl;}

// ── PEERJS ────────────────────────────────────────────────────────────────
try{localStorage.setItem('__t__','1');localStorage.removeItem('__t__');}
catch(e){const m={};Object.defineProperty(window,'localStorage',{value:{getItem:k=>m[k]??null,setItem:(k,v)=>{m[k]=v;},removeItem:k=>delete m[k],clear:()=>Object.keys(m).forEach(k=>delete m[k])}});}

const desktopId = new URLSearchParams(window.location.search).get('id');
let conn;
const peer = new Peer({config:{iceServers:[
    {urls:'stun:stun.l.google.com:19302'},
    {urls:'stun:stun1.l.google.com:19302'},
    {urls:'stun:stun.cloudflare.com:3478'}
]}});
peer.on('open',()=>{
    if(!desktopId){setStatus('','NO_ID');return;}
    setStatus('linking','LINKING');
    conn=peer.connect(desktopId,{serialization:'json',reliable:true});
    conn.on('open',()=>setStatus('linked','LINKED'));
    conn.on('close',()=>{setStatus('','LOST');conn=null;});
    conn.on('error',()=>setStatus('','ERROR'));
});
peer.on('error',(err)=>setStatus('',err.type||'ERR'));

function send(data){if(conn&&conn.open)conn.send(data);}

function sendCmd(cmd){
    send({type:'BUTTON',action:cmd});
    if(navigator.vibrate)navigator.vibrate(18);
}

function tapBtn(el,cmd){
    el.classList.add('pressed');
    setTimeout(()=>el.classList.remove('pressed'),250);
    sendCmd(cmd);
}

// ── JOYSTICK ──────────────────────────────────────────────────────────────
const joy = nipplejs.create({
    zone: document.getElementById('joy-zone'),
    mode: 'static', size: 120,
    position: { top: '50%', left: '50%' }
});

joy.on('move',(evt,data)=>{
    if(data.vector){
        const pos=data.instance.ui.front.getBoundingClientRect();
        pts['JOY']={x:pos.left+pos.width/2,y:pos.top+pos.height/2};
        // CORRECTED AXES:
        // nipplejs up   → vector.y = +1 → should move camera FORWARD  → send y = +data.vector.y
        // nipplejs right→ vector.x = +1 → should move camera RIGHT    → send x = +data.vector.x
        send({type:'MOVE', x: data.vector.x, y: data.vector.y, force: data.force});
    }
});
joy.on('end',()=>{delete pts['JOY'];send({type:'MOVE',x:0,y:0,force:0});});

// ── GYROSCOPE ─────────────────────────────────────────────────────────────
const gyroRing   = document.getElementById('gyro-ring');
const gyroDot    = document.getElementById('gyro-dot');
const gyroStatus = document.getElementById('gyro-status');

let gyroLive = false, baseGamma = null, baseBeta = null;
const SENS = 0.55, DEAD = 1.5;
const clamp = (v,a,b) => Math.max(a,Math.min(b,v));

function calibrateGyro(){
    baseGamma=null; baseBeta=null;
    gyroStatus.textContent='CALIBRATED'; gyroStatus.className='';
    gyroRing.classList.remove('active');
    if(navigator.vibrate)navigator.vibrate([15,40,15]);
}

function onOrientation(e){
    const rg = e.gamma??0, rb = e.beta??0;
    if(baseGamma===null){baseGamma=rg;baseBeta=rb;return;}
    let dx=rg-baseGamma, dy=rb-baseBeta;
    if(Math.abs(dx)<DEAD)dx=0;
    if(Math.abs(dy)<DEAD)dy=0;
    gyroDot.style.left=(50+clamp(dx,-40,40)/40*44)+'%';
    gyroDot.style.top =(50+clamp(dy,-40,40)/40*44)+'%';
    const moving=Math.abs(dx)>0||Math.abs(dy)>0;
    gyroRing.classList.toggle('active',moving);
    if(moving){
        if(!gyroLive){gyroLive=true;gyroStatus.textContent='ACTIVE';gyroStatus.className='active';}
        const rect=gyroRing.getBoundingClientRect();
        pts['GYRO']={x:rect.left+rect.width/2,y:rect.top+rect.height/2};
        send({type:'ROTATE', x:clamp(dx/40,-1,1)*SENS, y:clamp(dy/40,-1,1)*SENS, force:1});
    } else {
        delete pts['GYRO'];
        send({type:'ROTATE',x:0,y:0,force:0});
    }
}

// ── GYRO PERMISSION ───────────────────────────────────────────────────────
const gyroOverlay = document.getElementById('gyro-overlay');
function startGyro(){window.addEventListener('deviceorientation',onOrientation,true);gyroStatus.textContent='READY';}
function requestGyro(){
    if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
        DeviceOrientationEvent.requestPermission()
            .then(s=>{gyroOverlay.classList.add('hidden');if(s==='granted')startGyro();else gyroStatus.textContent='DENIED';})
            .catch(()=>{gyroOverlay.classList.add('hidden');gyroStatus.textContent='ERROR';});
    } else {gyroOverlay.classList.add('hidden');startGyro();}
}
if(typeof DeviceOrientationEvent==='undefined'||typeof DeviceOrientationEvent.requestPermission!=='function'){
    gyroOverlay.classList.add('hidden');startGyro();
}
</script>
</body>
</html>
